<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoilMate - Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'soilmate': {
                            '500': '#059669',
                            '700': '#047857',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --color-accent: #059669;
            --color-accent-dark: #047857;
        }

        .login-background {
            background-image: url('https://images.pexels.com/photos/2131784/pexels-photo-2131784.jpeg?cs=srgb&dl=pexels-quang-nguyen-vinh-222549-2131784.jpg&fm=jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2),
                        0 10px 10px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .accent-button {
            background-color: var(--color-accent);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .accent-button:hover {
            background-color: var(--color-accent-dark);
            transform: translateY(-1px);
        }

        input:focus {
            border-color: var(--color-accent) !important;
        }
    </style>
</head>
<body class="min-h-screen login-background flex items-center justify-center p-4">

    <div id="login-card" class="login-card w-full max-w-md p-8 sm:p-10 rounded-xl">

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-soilmate-500 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s-8-4.5-8-11A8 8 0 0 1 12 2a8 8 0 0 1 8 8c0 6.5-8 11-8 11z"/>
                    <path d="M12 18v-4M8 14h8"/>
                </svg>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-wide">Sign In to SoilMate</h1>
            </div>
            <p class="text-xl text-gray-600 font-medium">Field Command Center Access</p>
        </div>

        <!-- Login Form -->
        <form id="auth-form" class="space-y-6" action="/login" method="POST">

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                <input id="email" name="email" type="email" required
                       class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:ring-2 focus:ring-soilmate-500 focus:border-soilmate-500 sm:text-sm">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input id="password" name="password" type="password" required
                       class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:ring-2 focus:ring-soilmate-500 focus:border-soilmate-500 sm:text-sm">
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-soilmate-500 border-gray-300 rounded focus:ring-soilmate-500">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700">Remember me</label>
                </div>
                <a href="#" class="font-medium text-soilmate-500 hover:text-soilmate-700 text-sm">Forgot password?</a>
            </div>

            <div>
                <button type="submit" id="auth-button"
                        class="accent-button w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-base font-bold text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-soilmate-500">
                    Sign In
                </button>
            </div>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Don’t have an account?
            <a href="#" class="font-medium text-soilmate-500 hover:text-soilmate-700">Create Account</a>
        </p>
        <p class="mt-4 text-center text-sm text-gray-500">
            <a href="#" class="hover:text-soilmate-700">Contact your administrator</a> for manual access.
        </p>
    </div>

    <!-- Custom JS for Node.js Integration -->
    <script>
        document.getElementById("auth-form").addEventListener("submit", async function (event) {
            event.preventDefault();
            
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!email || !password) {
                alert("Please fill out both fields!");
                return;
            }

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({ email, password })
                });

                if (res.redirected) {
                    window.location.href = res.url; // Go to dashboard
                } else {
                    const text = await res.text();
                    alert(text);
                }
            } catch (err) {
                console.error("Error:", err);
                alert("Something went wrong while logging in.");
            }
        });
    </script>
</body>
</html>
